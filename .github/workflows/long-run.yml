name: long-run
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5h auto-cancel
    steps:
      - name: tmate SSH (temp, not fixed)
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
