name: long-run
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5h auto-cancel
    steps:
      - name: real sshd + bore tunnel (no tmate)
        run: |
          set -e
          PASS=$(openssl rand -base64 18 | tr -d '/+=' | head -c 20)
          echo "::notice::SSH_PASS=$PASS"
          echo "===== CONNECT INFO ====="
          echo "user: runner"
          echo "pass: $PASS"
          echo "========================"

          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq openssh-server > /dev/null
          sudo mkdir -p /run/sshd /home/runner/.ssh
          echo "runner:$PASS" | sudo chpasswd
          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
          echo "AllowUsers runner" | sudo tee -a /etc/ssh/sshd_config >/dev/null
          sudo /usr/sbin/sshd

          # bore: public TCP tunnel -> local 22, no fixed host
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /tmp
          chmod +x /tmp/bore

          # print tunnel endpoint continuously; keep job alive
          /tmp/bore local 22 --to bore.pub 2>&1 | tee /tmp/bore.log &
          BORE_PID=$!
          sleep 3
          ENDPOINT=$(grep -oE 'bore\.pub:[0-9]+' /tmp/bore.log | head -1 || true)
          if [ -z "$ENDPOINT" ]; then
            sleep 5
            ENDPOINT=$(grep -oE 'bore\.pub:[0-9]+' /tmp/bore.log | head -1 || true)
          fi
          echo "::notice::SSH_ENDPOINT=$ENDPOINT"
          echo "===== SSH COMMAND ====="
          echo "ssh runner@$ENDPOINT"
          echo "password: $PASS"
          echo "======================="
          # also write to summary for Actions UI
          {
            echo "### SSH"
            echo '```'
            echo "ssh runner@${ENDPOINT}"
            echo "password: $PASS"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # hold until job timeout (5.5h)
          while kill -0 $BORE_PID 2>/dev/null; do sleep 60; done
          wait $BORE_PID || true
